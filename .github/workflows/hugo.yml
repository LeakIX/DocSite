# Workflow for building and deploying a Hugo site to GitHub Pages
name: Build and Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.160.1
  PYTHON_VERSION: '3.13'
  LEAKIX_CLIENT_VERSION: '1.1.0'

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js dependencies
        run: make install-deps

      - name: Check trailing whitespace
        run: make check-trailing-whitespace

      - name: Check code formatting
        run: make check-prettify

  shellcheck:
    name: Shell examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint shell examples
        run: make lint-shell

  python:
    name: Python examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install leakix client
        run: pip install leakix>=${{ env.LEAKIX_CLIENT_VERSION }}

      - name: Check Python examples
        run: make check-examples-python

      - name: Validate JSON examples
        run: make check-examples-json

  build:
    name: Build
    needs: [lint, shellcheck, python]
    runs-on: ubuntu-latest
    env:
      HUGO_ENVIRONMENT: production
      TZ: America/Los_Angeles
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Node.js dependencies
        run: make install-deps

      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build with Hugo
        # prettier-ignore
        run: make build BASEURL="${{ steps.pages.outputs.base_url }}/" CACHEDIR="${{ runner.temp }}/hugo_cache"

      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
